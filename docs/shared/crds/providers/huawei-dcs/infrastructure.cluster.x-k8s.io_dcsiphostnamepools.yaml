  names:
    kind: DCSIpHostnamePool
    listKind: DCSIpHostnamePoolList
    plural: dcsiphostnamepools
    singular: dcsiphostnamepool
  scope: Namespaced
  versions:
  - name: v1beta1
    schema:
      openAPIV3Schema:
        description: DCSIpHostnamePool is the Schema for the dcsiphostnamepools API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DCSIpHostnamePoolSpec defines the desired state of DCSIpHostnamePool.
            properties:
              pool:
                items:
                  properties:
                    additionNic:
                      items:
                        properties:
                          dns:
                            type: string
                          dvSwitchName:
                            type: string
                          gateway:
                            type: string
                          ip:
                            type: string
                          ipv6:
                            type: string
                          mask:
                            type: string
                          portGroupName:
                            type: string
                          portGroupUrn:
                            type: string
                        type: object
                      type: array
                    dns:
                      type: string
                    dvSwitchName:
                      description: |-
                        add for multi nic support
                        if nic DVSwitchName or PortGroupName is nil, we will use vmtemplate DVSwitchName and PortGroupName
                      type: string
                    gateway:
                      type: string
                    hostname:
                      type: string
                    ip:
                      type: string
                    ipv6:
                      type: string
                    machineName:
                      type: string
                    mask:
                      type: string
                    persistentDisk:
                      description: |-
                        PersistentDisk defines disks that should survive VM upgrades (delete-recreate).
                        Each entry is bound to (ip, slot); slot determines attach order and guest device name.
                      items:
                        description: |-
                          PersistentDisk describes a disk that survives VM upgrades on an IP slot.
                          Identity key is (ip, slot). Path/Format are guest-side concerns: when both
                          are nil the disk runs in raw block mode — the controller still attaches it
                          to the VM, but Ignition skips mkfs/mount, leaving the device for guest-side
                          applications (e.g. Ceph OSD) to manage.
                        properties:
                          datastoreClusterName:
                            description: Provide exactly one of DatastoreClusterName
                              or DatastoreName.
                            type: string
                          datastoreName:
                            type: string
                          format:
                            description: |-
                              Format is the filesystem (xfs/ext4/...). Optional: when nil and Path is
                              also nil, the disk runs in raw block mode; when Path is set but Format
                              is nil, the Ignition template falls back to ext4. Immutable after
                              creation.
                            type: string
                          mountOptions:
                            items:
                              type: string
                            type: array
                          options:
                            description: 'Options: mkfs flags. Immutable after creation.'
                            items:
                              type: string
                            type: array
                          path:
                            description: |-
                              Path is the guest mount point (e.g. /var/lib/etcd). Optional: when nil,
                              Ignition does not render mkfs/mount for this disk (raw block mode).
                            pattern: ^/.+
                            type: string
                          pciType:
                            description: PciType defaults to "VIRTIO". Immutable after
                              creation.
                            type: string
                          quantityGB:
                            minimum: 1
                            type: integer
                          slot:
                            description: |-
                              Slot is the disk position (>= 0), unique per IP. Determines attach
                              order, sequenceNum and guest device name. Immutable.
                            minimum: 0
                            type: integer
                        required:
                        - quantityGB
                        - slot
                        type: object
                        x-kubernetes-validations:
                        - message: exactly one of datastoreClusterName or datastoreName
                            is required
                          rule: has(self.datastoreClusterName) != has(self.datastoreName)
                      type: array
                    portGroupName:
                      type: string
                    portGroupUrn:
                      type: string
                  type: object
                type: array
            required:
            - pool
            type: object
          status:
            description: DCSIpHostnamePoolStatus defines the observed state of DCSIpHostnamePool.
            properties:
              persistentDiskStatus:
                description: |-
                  PersistentDiskStatus survives DCSMachine delete-recreate; used for
                  volume coordination and crash recovery.
                items:
                  description: PersistentDiskStatus is the runtime state of a persistent
                    volume at a (ip, slot).
                  properties:
                    attachedVmUrn:
                      type: string
                    datastoreUrn:
                      type: string
                    ip:
                      type: string
                    lastError:
                      type: string
                    lastTransitionTime:
                      format: date-time
                      type: string
                    name:
                      description: |-
                        Name is the DCS volume name; format: {poolName}-{sha256(ip/slot)[:8]}.
                        Used for idempotent CreateVolume-by-name lookup.
                      type: string
                    ownerMachineName:
                      type: string
                    ownerMachineUID:
                      description: |-
                        OwnerMachineUID is retained across Machine delete so rolling upgrade
                        can hand the record to the next Machine rather than orphan it.
                      type: string
                    path:
                      type: string
                    phase:
                      description: DiskPhase is the coordination phase of a persistent
                        disk record.
                      enum:
                      - Creating
                      - Available
                      - Attaching
                      - Attached
                      - Detaching
                      - Deleting
                      - Error
                      type: string
                    slot:
                      type: integer
                    volumeUrn:
                      type: string
                  required:
                  - ip
                  - slot
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
