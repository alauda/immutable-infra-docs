                - host
                - port
                type: object
              controlPlaneLoadBalancer:
                properties:
                  elbVirsubnetL4Ips:
                    items:
                      properties:
                        ips:
                          description: IPs is a list of IP addresses associated with
                            the virtual subnet, serialized as a JSON array of strings
                            and optional.
                          items:
                            type: string
                          type: array
                        subnetName:
                          description: SubnetName is a pointer to a string that specifies
                            the name of the subnet, optionally included in JSON output.
                          type: string
                      type: object
                    type: array
                  elbVirsubnetL7Ips:
                    items:
                      properties:
                        ips:
                          description: IPs is a list of IP addresses associated with
